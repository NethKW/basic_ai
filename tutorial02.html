<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Intent Selection</title>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.16.0/dist/tf.min.js"></script>

    <link rel="stylesheet" href="tutorial02.css" />
</head>

<body>

    <div class="t02 main">
        <h2>Intent Selection Model</h2>
        <p>Open Console</p>
    </div>

    <script>
        const trainingData = [
            { text: "hi", intent: "greeting" },
            { text: "hello", intent: "greeting" },
            { text: "hey", intent: "greeting" },
            { text: "good morning", intent: "greeting" },

            { text: "burger", intent: "order_food" },
            { text: "pizza", intent: "order_food" },
            { text: "order coffee", intent: "order_food" },
            { text: "can i order fish bun", intent: "order_food" },

            { text: "bye", intent: "goodbye" },
            { text: "see you", intent: "goodbye" }
        ];
        //tokenizer
        function tokenize(text) {
            return text
                .toLowerCase()
                .replace(/[^\w\s]/g, "")
                .split(/\s+/)
                .filter(Boolean);
        }

        //Build Vocabulary
        const vocabulary = [];

        trainingData.forEach(d => {
            tokenize(d.text).forEach(word => {
                if (!vocabulary.includes(word)) {
                    vocabulary.push(word);
                }
            });
        });

        console.log("Vocabulary:", vocabulary);

        const intents = [];

        trainingData.forEach(d => {
            if (!intents.includes(d.intent)) {
                intents.push(d.intent);
            }
        });

        console.log("Intents:", intents);

        //Text → Bag of Words Vector
        function textToVector(text) {
            const tokens = tokenize(text);
            return vocabulary.map(word => tokens.includes(word) ? 1 : 0);
        }

        //Prepare Tensors

        const xs = tf.tensor2d(
            trainingData.map(d => textToVector(d.text))
        );

        const ys = tf.tensor2d(
            trainingData.map(d =>
                intents.map(intent => intent === d.intent ? 1 : 0)
            )
        );

        console.log("xs shape:", xs.shape);
        console.log("ys shape:", ys.shape);

        //Build Model
        function createModel() {
            const model = tf.sequential();

            model.add(tf.layers.dense({
                inputShape: [vocabulary.length],
                units: 16,
                activation: "relu"
            }));

            model.add(tf.layers.dense({
                units: intents.length,
                activation: "softmax"
            }));

            model.compile({
                optimizer: "adam",
                loss: "categoricalCrossentropy",
                metrics: ["accuracy"]
            });

            //   model.summary();
            return model;
        }

        //Train Model 
        let model
        async function trainModel() {
            model = createModel();

            console.log("Training started...");
            await model.fit(xs, ys, {
                epochs: 200,
                shuffle: true,
                verbose: 1
            });

            // Save to browser localStorage
            await model.save("localstorage://intent-model");

            console.log("Training complete & model saved");
        }

        //Predict Function

        function predict(text) {
            const vector = textToVector(text);
            const input = tf.tensor2d([vector]);
            const output = model.predict(input);
            const index = output.argMax(1).dataSync()[0];

            console.log(`"${text}" → ${intents[index]}`);
        }

        //Run
        (async () => {
            await trainModel();

            predict("good evening");
            predict("burger");
            predict("i need pizza");
            predict("bye guys");
        })();
    </script>

</body>

</html>
